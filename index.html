<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevConf 2026 Landing Page</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <nav class="navbar">

            <div class="logo">
                <img src="./assets/logo.png" alt="DevConf 2026 logo">
            </div>

            <ul class="nav-links">
                <li><a href="#speakers">Speakers</a></li>
                <li><a href="#schedule">Schedule</a></li>
                <li><a href="#tracks">Tracks</a></li>
                <li><a href="#venue">Venue</a></li>
                <li><a href="#blog">Blog</a></li>
            </ul>

            <a href="#register" class="btn">Register Now</a>

        </nav>
    </header>
    <section class="hero">
        <img src="./assets/banner.jpg" alt="DevConf 2026 hero image" class="hero-img">

        <div class="hero-content">
            <h1>Code. <em>Connect.</em> Create</h1>

            <p>
                Join 4,000+ engineers, founders, and builders at the premier developer
                conference of 2026. Three days of cutting-edge talks, hands-on workshops,
                and meaningful connections.
            </p>

            <a href="#register" class="hero-btn">Register Now</a>
        </div>
    </section>


</body>

</html>
